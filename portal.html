<!doctype html>

<head>

  <title>Member Portal | Sentinel Baptist Church</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{background:#f8f6f1;color:#1f2937}.card{background:#fff;border-radius:1rem;padding:1.5rem;box-shadow:0 8px 24px #11182712}.card h2,.card h3{font-size:1.25rem;font-weight:700;margin:1.5rem 0 1rem}.card h2{margin-top:0}input,textarea,select{display:block;width:100%;border:1px solid #d1d5db;border-radius:.65rem;padding:.75rem;margin:.7rem 0;background:#fff}textarea{min-height:7rem}fieldset{border:1px solid #e5e7eb;border-radius:.65rem;padding:.5rem 1rem;margin:.75rem 0}legend{font-weight:600;padding:0 .25rem}button{background:#b2730c;color:white;border-radius:.65rem;padding:.7rem 1rem;font-weight:600;margin-top:.4rem}.secondary{background:#374151;margin-left:.4rem}.outline{background:#fff;color:#8a5808;border:1px solid #d6a74e;margin:0}.check{display:block;margin:.75rem 0}.check input{display:inline;width:auto;margin-right:.4rem}.member-toolbar{display:grid;grid-template-columns:1fr 13rem;gap:.75rem;align-items:end;margin:1.25rem 0}.member-toolbar label{font-weight:600;font-size:.9rem}.member-toolbar input,.member-toolbar select{margin:.35rem 0 0}.member-summary{display:flex;gap:.6rem;flex-wrap:wrap;margin:.75rem 0 1rem}.summary-pill,.status-pill,.source-pill{display:inline-flex;align-items:center;border-radius:999px;padding:.3rem .7rem;font-size:.78rem;font-weight:700}.summary-pill{background:#f3efe5;color:#6b4c13}.status-pill.pending{background:#fef3c7;color:#92400e}.status-pill.approved{background:#dcfce7;color:#166534}.status-pill.declined{background:#fee2e2;color:#991b1b}.source-pill{background:#e0e7ff;color:#3730a3}.member-list{display:grid;gap:.8rem}.member-card{border:1px solid #e5e7eb;border-radius:.9rem;padding:1rem;display:flex;gap:1rem;justify-content:space-between;align-items:flex-start}.member-card h4{font-weight:700;font-size:1.05rem}.member-meta{font-size:.88rem;color:#64748b;margin-top:.25rem}.member-actions{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end}.member-actions button{font-size:.84rem;margin:0}.detail-backdrop{position:fixed;inset:0;background:#0f172a99;display:flex;align-items:center;justify-content:center;padding:1rem;z-index:50}.detail-panel{background:#fff;width:min(48rem,100%);max-height:88vh;overflow:auto;border-radius:1rem;padding:1.5rem;box-shadow:0 24px 48px #11182755}.detail-head{display:flex;justify-content:space-between;gap:1rem;align-items:flex-start}.detail-section{border-top:1px solid #e5e7eb;margin-top:1.25rem;padding-top:1.1rem}.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem}.detail-item dt{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:700}.detail-item dd{margin:.25rem 0 0;white-space:pre-wrap;overflow-wrap:anywhere}.empty-state{padding:2rem 1rem;text-align:center;color:#64748b}@media(max-width:640px){.member-toolbar,.detail-grid{grid-template-columns:1fr}.member-card{display:block}.member-actions{justify-content:flex-start;margin-top:1rem}}
    :root{--ink:#172033;--muted:#62708a;--surface:#fff;--line:#dbe2ea;--brand:#9a6410;--brand-dark:#754808;--navy:#243248;--focus:#2563eb}body{background:linear-gradient(135deg,#f8f6f1,#f3f6fa);color:var(--ink);font-size:16px}main{max-width:72rem!important}.card{border:1px solid #e6e9ef;border-radius:1.25rem;padding:1.75rem;box-shadow:0 12px 28px #1f29370d}.card h2,.card h3{letter-spacing:-.02em}input,textarea,select{border:1px solid var(--line);border-radius:.75rem;padding:.8rem .9rem;margin:.65rem 0;color:var(--ink);box-shadow:0 1px 2px #0f172a08;transition:border-color .15s,box-shadow .15s}input::placeholder,textarea::placeholder{color:#7b8799}input:focus,textarea:focus,select:focus{outline:0;border-color:var(--focus);box-shadow:0 0 0 3px #2563eb24}button{background:var(--brand);color:#fff;border-radius:.7rem;padding:.75rem 1rem;font-weight:700;line-height:1.15;transition:transform .15s,background .15s,box-shadow .15s}button:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 5px 12px #75480822}.secondary{background:var(--navy);color:#fff;margin-left:.4rem}.secondary:hover{background:#172033}.outline{background:#fff;color:var(--brand-dark);border:1px solid #c89946}.outline:hover{background:#fff8ea;color:#5d3907}.dashboard-shell{margin-top:2.5rem}.dashboard-heading{display:flex;align-items:end;justify-content:space-between;gap:1rem;margin-bottom:1.25rem}.dashboard-heading h2{font-size:2rem;font-weight:800;letter-spacing:-.035em}.dashboard-heading p:last-child{color:var(--muted);margin-top:.25rem}.eyebrow{color:var(--brand-dark);font-weight:800;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase}.dashboard-nav{display:flex;gap:.4rem;overflow:auto;padding:.45rem;background:#e9edf2;border-radius:1rem;margin-bottom:1.25rem}.nav-link{background:transparent;color:#4b5b70;box-shadow:none;margin:0;white-space:nowrap}.nav-link:hover{background:#fff;color:var(--ink);box-shadow:none}.nav-link.active{background:#fff;color:var(--brand-dark);box-shadow:0 2px 6px #17203316}.dashboard-page{min-height:22rem}.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-top:1.5rem}.stat-card{background:#f8fafc;border:1px solid var(--line);border-radius:1rem;padding:1.1rem}.stat-card strong{display:block;font-size:2rem;line-height:1;color:var(--brand-dark)}.stat-card span{display:block;color:var(--muted);font-size:.9rem;margin-top:.5rem}.quick-actions{display:flex;flex-wrap:wrap;gap:.65rem;margin-top:1.5rem}.quick-actions button{margin:0}.form-card{max-width:50rem}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 1rem}.form-grid textarea,.form-grid fieldset,.form-grid .form-actions{grid-column:1/-1}.form-actions{margin-top:.5rem}.field-label{display:block;font-weight:700;font-size:.9rem;color:#475569}.field-label input{font-weight:400}.member-card{background:#fff;border-color:var(--line);padding:1.1rem 1.2rem;box-shadow:0 2px 4px #17203308}.member-card:hover{border-color:#bfc9d6}.detail-panel{border-radius:1.25rem}.detail-head .secondary{margin:0}@media(max-width:640px){main{padding-left:1rem!important;padding-right:1rem!important}.dashboard-heading h2{font-size:1.65rem}.dashboard-nav{border-radius:.85rem}.stat-grid,.form-grid{grid-template-columns:1fr}.quick-actions{display:grid}.quick-actions button{width:100%}}
  </style>
