<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Church Blog | Sentinel Baptist Church</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--gold:#b2730c;--gold-dark:#8f5b09;--ink:#172033;--canvas:#f8f6f1}
    body{background:var(--canvas);color:var(--ink)}.post-card{overflow:hidden;border:1px solid #e5e7eb;border-radius:1.25rem;background:#fff;box-shadow:0 10px 28px #1720330d}.post-card img{width:100%;height:15rem;object-fit:cover}.post-card-content{padding:1.6rem}.post-date{color:var(--gold-dark);font-size:.78rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase}.post-content{white-space:pre-wrap;color:#475569;line-height:1.75}.empty-posts{padding:3rem 1rem;text-align:center;color:#64748b}
  </style>
</head>
<body>
  <header class="bg-[#b2730c] text-white shadow-lg">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6">
      <a class="flex items-center gap-3 font-bold text-lg sm:text-xl" href="index.html"><img src="images/logo.jpeg" alt="" class="h-10 w-auto">Sentinel Baptist Church</a>
      <a class="rounded-lg px-3 py-2 font-semibold transition hover:bg-white/15" href="index.html">Back to website</a>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-14 sm:px-6">
    <p class="text-sm font-extrabold uppercase tracking-[.18em] text-[#8f5b09]">Sentinel Baptist Church</p>
    <h1 class="mt-3 text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl">Church Blog</h1>
    <p class="mt-4 max-w-2xl text-lg leading-relaxed text-slate-600">Biblical encouragement, church news, and resources to help us grow together in Christ.</p>
    <section class="mt-10 grid gap-7 md:grid-cols-2" data-blog-posts aria-live="polite">
      <p class="empty-posts md:col-span-2">Loading articles…</p>
    </section>
  </main>
  <footer class="border-t border-slate-200 py-9 text-center text-sm text-slate-500">© 2026 Sentinel Baptist Church</footer>
  <script type="module" src="app.js?v=blog-20260723"></script>
</body>
</html>
